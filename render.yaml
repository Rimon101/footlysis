databases:
  - name: footlysis-db
    plan: free

envVarGroups:
  - name: footlysis-secrets
    envVars:
      - key: VITE_ADMIN_API_KEY
        generateValue: true

services:
  # FastAPI Backend
  - type: web
    name: footlysis-backend
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: |
      cd backend
      pip install -r requirements.txt
    startCommand: |
      cd backend
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: footlysis-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - fromGroup: footlysis-secrets

  # React Frontend (Static Site)
  - type: web
    name: footlysis-frontend
    runtime: static
    buildCommand: |
      cd frontend
      npm install
      npm run build
    staticPublishPath: frontend/dist
    envVars:
      # Public URL of the backend (fromService only gives internal addresses)
      - key: VITE_API_URL
        value: https://footlysis-backend.onrender.com
      - fromGroup: footlysis-secrets
